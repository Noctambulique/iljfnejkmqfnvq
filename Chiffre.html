<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Générateur minimal</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #number {
      font-size: 48px;
      margin-bottom: 20px;
    }

    #text {
      font-size: 18px;
      opacity: 0.7;
      max-width: 400px;
      margin-bottom: 30px;
    }

    button {
      padding: 10px 20px;
      border: 1px solid black;
      border-radius: 20px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: black;
      color: white;
    }
  </style>
</head>
<body>

  <div id="number"></div>
  <div id="text"></div>
  <button onclick="changer()">Changer</button>

  <script>
    const phrases = [
      "0 = Immature 10 = Mature",
      "0 = Un dessin animé ou film nul 10 = Un film ou dessin animé incroyable.",
      "0 = Un pouvoir nul à chier 10 = Un incroyable pouvoir.",
      "0 = Un métier horrible 10 = meilleur métier",
      "0 = Un repas dégeu 10 = meilleur repas de ta vie",
      "0 = journée nul 10 = incroyable journée",
"0 = Une tenue ridicule 10 = Un style incroyable"
"0 = Une musique insupportable 10 = Une musique parfaite"
  "0 = Une idée stupide 10 = Une idée géniale"
    "0 = Un cadeau inutile 10 = Le cadeau parfait"
    "0 = Une décision stupide 10 = Une décision brillante"
    "0 = Une odeur insupportable 10 = Une odeur délicieuse"
    "0 = Une perte de temps 10 = Un moment bien investi"
    ];

    function nombreAleatoire() {
      return Math.floor(Math.random() * 10);
    }

    function phraseAleatoire() {
      return phrases[Math.floor(Math.random() * phrases.length)];
    }

    function changer() {
      document.getElementById("number").textContent = nombreAleatoire();
      document.getElementById("text").textContent = phraseAleatoire();
    }

    // Initialisation
    changer();
  </script>

</body>
</html>
