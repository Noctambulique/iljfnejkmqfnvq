<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Undercover Game</title>
<style>
body { font-family: Arial; text-align: center; background:#f4f4f4; }
.container { max-width: 600px; margin: auto; padding:20px; background:white; border-radius:10px; }
input, button { margin:5px; padding:10px; }
.hidden { display:none; }
.numbers { display:flex; flex-wrap:wrap; justify-content:center; }
.numbers label { margin:5px; }
</style>
</head>

<body>
<div class="container">
<h1>Undercover</h1>

<h3>Nombre de joueurs</h3>
<input type="number" id="players" min="3" value="4">

<h3>Nombre d'undercover</h3>
<input type="number" id="undercoverCount" min="1" value="1">

<h3>Chiffres à EXCLURE</h3>
<div class="numbers" id="numberSelector"></div>

<br>
<button onclick="startGame()">Démarrer</button>

<div id="game" class="hidden">
<h2 id="playerTurn"></h2>
<button onclick="showWord()">Voir mon mot</button>
<p id="word" class="hidden"></p>
<button onclick="nextPlayer()" id="nextBtn" class="hidden">Joueur suivant</button>
</div>
</div>

<script>

// =============================
// 🔧 PAIRES + NUMÉROS
// =============================
const WORD_PAIRS = [
  {pair:["Zélie","Hélène"], number:1},
  {pair:["Hélène","Rose"], number:2},
  {pair:["Rose","Zélie"], number:3},
  {pair:["Noé","Samuel"], number:4},
  {pair:["Noé","Octave"], number:5},
  {pair:["Samuel","Octave"], number:6},
  {pair:["Ernest","Noé"], number:7},
  {pair:["Ernest","Octave"], number:8},
  {pair:["Octave","Nathan"], number:9},
  {pair:["Noé","Rose"], number:10},
  {pair:["Julie","Marion"], number:11},
  {pair:["Samuel","Ronaldo"], number:12},
  {pair:["Noé","Nathan"], number:13},
  {pair:["François","Antoine"], number:14},
  {pair:["Antoine","Jean Claude"], number:15},
  {pair:["Olive","Antoine"], number:16},
];

// =============================

let assignments = [];
let currentPlayer = 0;

// Générer les cases à cocher
function generateNumberSelector() {
  let container = document.getElementById("numberSelector");
  WORD_PAIRS.forEach(obj => {
    let label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${obj.number}"> ${obj.number}`;
    container.appendChild(label);
  });
}
generateNumberSelector();

// Mélange ultra aléatoire (Fisher-Yates)
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startGame() {
  let numPlayers = parseInt(document.getElementById('players').value);
  let undercoverCount = parseInt(document.getElementById('undercoverCount').value);

  if (undercoverCount >= numPlayers) {
    alert("Trop d'undercover !");
    return;
  }

  // Récupérer chiffres exclus
  let excluded = Array.from(document.querySelectorAll("#numberSelector input:checked"))
                      .map(cb => parseInt(cb.value));

  let availablePairs = WORD_PAIRS.filter(p => !excluded.includes(p.number));

  if (availablePairs.length === 0) {
    alert("Tous les chiffres sont exclus !");
    return;
  }

  // Tirage aléatoire fort
  let selected = availablePairs[Math.floor(Math.random() * availablePairs.length)];
  let pair = selected.pair;
  let number = selected.number;

  let roles = [];

  // Construire rôles
  for (let i = 0; i < numPlayers - undercoverCount; i++) {
    roles.push(pair[0]);
  }
  for (let i = 0; i < undercoverCount; i++) {
    roles.push(pair[1]);
  }

  // Mélange complet des rôles (super important)
  assignments = shuffle(roles);

  // Mélange encore pour casser tout biais
  assignments = shuffle(assignments);

  // Ajouter le chiffre à chaque mot
  assignments = assignments.map(word => word + " (" + number + ")");

  currentPlayer = 0;
  document.getElementById('game').classList.remove('hidden');
  updateTurn();
}

function updateTurn() {
  document.getElementById('playerTurn').textContent = "Joueur " + (currentPlayer + 1);
  document.getElementById('word').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
}

function showWord() {
  document.getElementById('word').textContent = assignments[currentPlayer];
  document.getElementById('word').classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextPlayer() {
  currentPlayer++;
  if(currentPlayer >= assignments.length) {
    alert("Tous les joueurs ont vu leur mot !");
    location.reload();
    return;
  }
  updateTurn();
}

</script>
</body>
</html>
