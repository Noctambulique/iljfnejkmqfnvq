<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Undercover Game</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background:#f4f4f4;
}

.container {
  max-width: 600px;
  margin: auto;
  padding:20px;
  background:white;
  border-radius:10px;
}

/* 🔥 Boutons + inputs agrandis */
input, button {
  margin:8px;
  padding:14px;
  font-size:16px;
  border-radius:8px;
}

button {
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;
}

button:hover {
  background:#0056b3;
}

.hidden { display:none; }

.numbers {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.numbers label {
  margin:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<h1>Undercover</h1>

<h3>Nombre de joueurs</h3>
<input type="number" id="players" min="3" value="4">

<h3>Nombre d'undercover</h3>
<input type="number" id="undercoverCount" min="1" value="1">

<h3>Nombre de Mr White</h3>
<input type="number" id="whiteCount" min="0" value="0">

<h3>Chiffres à EXCLURE</h3>
<div class="numbers" id="numberSelector"></div>

<br>
<button onclick="startGame()">Démarrer</button>

<div id="game" class="hidden">
  <h2 id="playerTurn"></h2>
  <button onclick="showWord()">Voir mon mot</button>
  <p id="word" class="hidden" style="font-size:20px; font-weight:bold;"></p>
  <button onclick="nextPlayer()" id="nextBtn" class="hidden">Joueur suivant</button>
</div>
</div>

<script>

// =============================
// 🔧 PAIRES + NUMÉROS
// =============================
const WORD_PAIRS = [
  {pair:["Zélie","Hélène"], number:1},
  {pair:["Jean Claude","François"], number:2},
  {pair:["Rose","Zélie"], number:3},
  {pair:["Noé","Samuel"], number:4},
  {pair:["Noé","Octave"], number:5},
  {pair:["François avant Ce soir","François après ce soir"], number:6},
  {pair:["Ernest","Noé"], number:7},
  {pair:["Olive","Antoine"], number:8},
  {pair:["Octave","Nathan"], number:9},
  {pair:["Noé","Rose"], number:10},
  {pair:["Julie","Marion"], number:11},
  {pair:["Samuel","Ronaldo"], number:12},
  {pair:["Noé","Nathan"], number:13},
  {pair:["François","Antoine"], number:14},
  {pair:["Antoine","Jean Claude"], number:15},
];

let assignments = [];
let currentPlayer = 0;

// Générer les cases à cocher
function generateNumberSelector() {
  let container = document.getElementById("numberSelector");
  WORD_PAIRS.forEach(obj => {
    let label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${obj.number}"> ${obj.number}`;
    container.appendChild(label);
  });
}
generateNumberSelector();

// Mélange Fisher-Yates
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startGame() {
  let numPlayers = parseInt(document.getElementById('players').value);
  let undercoverCount = parseInt(document.getElementById('undercoverCount').value);
  let whiteCount = parseInt(document.getElementById('whiteCount').value);

  if (undercoverCount + whiteCount >= numPlayers) {
    alert("Trop de rôles spéciaux !");
    return;
  }

  // Exclusions
  let excluded = Array.from(document.querySelectorAll("#numberSelector input:checked"))
                      .map(cb => parseInt(cb.value));

  let availablePairs = WORD_PAIRS.filter(p => !excluded.includes(p.number));

  if (availablePairs.length === 0) {
    alert("Tous les chiffres sont exclus !");
    return;
  }

  let selected = availablePairs[Math.floor(Math.random() * availablePairs.length)];
  let pair = selected.pair;
  let number = selected.number;

  let roles = [];

  // Civils
  for (let i = 0; i < numPlayers - undercoverCount - whiteCount; i++) {
    roles.push(pair[0]);
  }

  // Undercover
  for (let i = 0; i < undercoverCount; i++) {
    roles.push(pair[1]);
  }

  // Mr White
  for (let i = 0; i < whiteCount; i++) {
    roles.push(null);
  }

  assignments = shuffle(roles);
  assignments = shuffle(assignments);

  assignments = assignments.map(word => {
    if (word === null) return "🤍 Mr White (aucun mot)";
    return word + " (" + number + ")";
  });

  currentPlayer = 0;
  document.getElementById('game').classList.remove('hidden');
  updateTurn();
}

function updateTurn() {
  document.getElementById('playerTurn').textContent = "Joueur " + (currentPlayer + 1);
  document.getElementById('word').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
}

function showWord() {
  document.getElementById('word').textContent = assignments[currentPlayer];
  document.getElementById('word').classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextPlayer() {
  currentPlayer++;
  if(currentPlayer >= assignments.length) {
    alert("Tous les joueurs ont vu leur mot !");
    location.reload();
    return;
  }
  updateTurn();
}

</script>

</body>
</html>
