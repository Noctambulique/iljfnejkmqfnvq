<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Undercover Game</title>
  <style>
    body { font-family: Arial; text-align: center; background:#f4f4f4; }
    .container { max-width: 600px; margin: auto; padding:20px; background:white; border-radius:10px; }
    input, button { margin:5px; padding:10px; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Undercover</h1>

    <h3>Nombre de joueurs</h3>
    <input type="number" id="players" min="3" value="4">

    <h3>Nombre d'undercover</h3>
    <input type="number" id="undercoverCount" min="1" value="1">

    <br><br>
    <button onclick="startGame()">Démarrer</button>

    <div id="game" class="hidden">
      <h2 id="playerTurn"></h2>
      <button onclick="showWord()">Voir mon mot</button>
      <p id="word" class="hidden"></p>
      <button onclick="nextPlayer()" id="nextBtn" class="hidden">Joueur suivant</button>
    </div>
  </div>

<script>

// =============================
// 🔧 PERSONNALISATION SIMPLE
// Ajoute ici autant de paires que tu veux
// =============================

const WORD_PAIRS = [
  ["Pikachu", "Souris"],
  ["Chat", "Tigre"],
  ["Voiture", "Camion"],
  ["Pizza", "Burger"]
];

// =============================

let assignments = [];
let currentPlayer = 0;

function startGame() {
  let numPlayers = parseInt(document.getElementById('players').value);
  let undercoverCount = parseInt(document.getElementById('undercoverCount').value);

  if (undercoverCount >= numPlayers) {
    alert("Trop d'undercover !");
    return;
  }

  let pair = WORD_PAIRS[Math.floor(Math.random() * WORD_PAIRS.length)];

  // Choix aléatoire du mot majoritaire
  let majorityIndex = Math.floor(Math.random() * 2);
  let minorityIndex = majorityIndex === 0 ? 1 : 0;

  assignments = new Array(numPlayers).fill(pair[majorityIndex]);

  // Tirage des undercover uniques
  let indices = [];
  while(indices.length < undercoverCount) {
    let rand = Math.floor(Math.random() * numPlayers);
    if(!indices.includes(rand)) {
      indices.push(rand);
    }
  }

  // Attribution mot minoritaire
  indices.forEach(i => {
    assignments[i] = pair[minorityIndex];
  });

  currentPlayer = 0;
  document.getElementById('game').classList.remove('hidden');
  updateTurn();
}

function updateTurn() {
  document.getElementById('playerTurn').textContent = "Joueur " + (currentPlayer + 1);
  document.getElementById('word').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
}

function showWord() {
  document.getElementById('word').textContent = assignments[currentPlayer];
  document.getElementById('word').classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextPlayer() {
  currentPlayer++;
  if(currentPlayer >= assignments.length) {
    alert("Tous les joueurs ont vu leur mot !");
    location.reload();
    return;
  }
  updateTurn();
}

</script>
</body>
</html>
